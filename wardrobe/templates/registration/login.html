{% extends "wardrobe/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm mt-5">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">Вход</h2>

                {% if form.errors %}
                    <div class="text-danger small text-center mb-3">Неверная почта или пароль</div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px; font-weight: 600;">Электронная почта</label>
                        <input type="email" name="username" class="form-control border-0 bg-light" style="border-radius: 0; padding: 12px;" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-uppercase" style="font-size: 0.7rem; letter-spacing: 1px; font-weight: 600;">Пароль</label>
                        <input type="password" name="password" class="form-control border-0 bg-light" style="border-radius: 0; padding: 12px;" required>
                    </div>
                    <button type="submit" class="btn btn-accent w-100 mt-3">ВОЙТИ</button>
                </form>

                <div class="text-center mt-4">
                    <small class="text-muted">Нет аккаунта? <a href="{% url 'signup' %}" class="text-dark">Регистрация</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
